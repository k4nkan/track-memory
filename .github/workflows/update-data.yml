name: Update Monthly Data

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    environment: supabase-env

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update data.json
        env:
          SONG_SUPABASE_URL: ${{ secrets.SONG_SUPABASE_URL }}
          SONG_SUPABASE_KEY: ${{ secrets.SONG_SUPABASE_KEY }}
          SONG_RESULT_LIMIT: "20"
        run: python script/main.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add design/data.json
          git diff --cached --quiet || git commit -m "Update monthly data"

      - name: Push changes
        run: git push
