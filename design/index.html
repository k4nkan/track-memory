<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Songs</title>
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hachi+Maru+Pop&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <div class="header-content">
          <div>
            <h1>No Music, No Life.</h1>
            <p>いっぱい聞いた曲</p>
          </div>
          <select id="month-select" class="month-select" aria-label="Select month">
            <option value="2026-02.json" selected>2026年2月</option>
            <option value="2026-01.json">2026年1月</option>
          </select>
        </div>
      </header>

      <section class="grid-section" aria-labelledby="grid-title">
        <h2 id="grid-title" class="sr-only">Album Grid</h2>
        <div id="grid" class="grid"></div>
      </section>
    </main>
    <script src="data.js" defer></script>
